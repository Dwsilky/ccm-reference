# Single source of truth for the control catalog.
# coverage-matrix.md is GENERATED from this file (scripts/gen_matrix.py) so the
# README matrix can never drift from what the code actually implements.
#
# bucket values:
#   machine    - machine-evaluable: config state we can compute pass/fail on
#   attestable - evidence-attestable: can't compute pass/fail, but can pull the
#                artifact proving a process ran, on a schedule
#   judgment   - human-judgment: automate only the reminder + tracking
#
# status: implemented | planned
#
# severity: finding severity when the control FAILS (ASFF label). Drives the
#           router's SLA tier. Passing findings are always INFORMATIONAL.
# prowler_checks: optional Prowler event_codes that evidence the same control,
#           so scanner findings attribute to catalog coverage. Best-effort —
#           unmapped Prowler findings still normalize, they just carry no
#           ccm:control_id.

controls:
  # ---- Bucket 1: machine-evaluable (custom AWS Config rules) ----
