# Tool configuration only — this repo is a reference implementation, not an
# installable library, so dependencies live in requirements*.txt.

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.lint.isort]
# Top-level dirs are audit-domain named (config-rules/), not one installable
# package; tell isort which import roots are ours.
known-first-party = ["shared", "src", "tests", "normalizer", "collectors", "router"]
